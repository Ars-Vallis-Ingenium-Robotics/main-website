<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AVI Robotics — Vintage Days Menu</title>
  <link rel="stylesheet" href="./vintage-days-menu.css" />
</head>
<body>
  <main class="wrap" role="main" aria-label="Vintage Days menu page">
    <section class="card">
      <header class="hero">
        <div class="logoWrap" aria-hidden="true">
          <img src="../Logos/aviDogDefault.png" alt="" />
        </div>
        <div>
          <p class="eyebrow">Vintage Days</p>
          <h1 class="title">AVI Menu</h1>
          <p class="subtitle">Vintage Days food and drink offerings from AVI Robotics.</p>
        </div>
      </header>

      <div class="divider" role="separator" aria-hidden="true"></div>

      <section class="paymentSection" aria-label="Payment options">
        <div class="paymentHeader">
          <h2 class="paymentTitle">Payment Options</h2>
          <p class="paymentText">Use your preferred payment method below.</p>
        </div>
        <div class="paymentButtons" id="paymentButtons"></div>
      </section>

      <div class="divider" role="separator" aria-hidden="true"></div>

      <section class="menuGrid" id="menuGrid" aria-label="Vintage Days menu sections"></section>

      <footer class="footer">
        <span class="pill">AVI Robotics</span>
        <span>•</span>
        <span>Vintage Days</span>
      </footer>
    </section>

    <div class="bg" aria-hidden="true">
      <div class="blob blobA"></div>
      <div class="blob blobB"></div>
      <div class="grid"></div>
    </div>
  </main>

  <script src="./vintage-days-menu.js"></script>
</body>
</html>
